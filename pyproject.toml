[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "top10-clientes-pipeline"
version = "0.1.0"
description = "PySpark pipeline to identify Top-10 customers by purchase volume"
requires-python = ">=3.10"
dependencies = [
    "pyspark>=3.5",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "flake8>=6.0",
]

[tool.setuptools.packages.find]
include = ["src*"]

[tool.black]
line-length = 79
target-version = ["py310"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
